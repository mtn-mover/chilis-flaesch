<!DOCTYPE html>
<html lang="de-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kommentarverwaltung - Fläsch Info Admin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="cookie-consent.css">
    <style>
        /* Page-specific comment styles */
        .comment-item {
            border: 1px solid var(--color-neutral-200);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-3);
            transition: box-shadow 0.2s;
        }
        .comment-item:hover { box-shadow: var(--shadow-sm); }
        .comment-item.is-reply {
            margin-left: var(--space-8);
            border-left: 3px solid var(--color-primary-400);
            background: var(--color-primary-50);
        }
        .comment-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--space-2);
            flex-wrap: wrap;
            gap: var(--space-2);
        }
        .comment-meta .author {
            font-weight: 600;
            color: var(--color-primary-700);
        }
        .comment-meta .date {
            font-size: var(--text-xs);
            color: var(--color-neutral-500);
        }
        .comment-text {
            font-size: var(--text-sm);
            line-height: var(--leading-relaxed);
            margin-bottom: var(--space-3);
            color: var(--color-neutral-700);
        }
        .comment-actions {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
        }
        .reply-form {
            display: none;
            margin-top: var(--space-3);
            padding-top: var(--space-3);
            border-top: 1px solid var(--color-neutral-200);
        }
        .reply-form textarea {
            width: 100%;
            padding: var(--space-3);
            border: 1.5px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            font-family: var(--font-sans);
            font-size: var(--text-sm);
            min-height: 80px;
            resize: vertical;
            margin-bottom: var(--space-2);
        }
        .reply-form textarea:focus {
            outline: none;
            border-color: var(--color-primary-500);
            box-shadow: 0 0 0 3px rgba(184, 132, 90, 0.15);
        }
        .badge-reply {
            background: rgba(46, 125, 155, 0.1);
            color: var(--color-info);
            font-size: var(--text-xs);
            font-weight: 600;
            padding: 0.15rem 0.4rem;
            border-radius: 2px;
        }
        .badge-rejected {
            background: rgba(190, 49, 68, 0.1);
            color: var(--color-error);
            font-size: var(--text-xs);
            font-weight: 600;
            padding: 0.15rem 0.4rem;
            border-radius: 2px;
        }
        .article-link {
            font-size: var(--text-xs);
            color: var(--color-primary-500);
        }
        .article-link:hover { color: var(--color-accent-500); }
        .filter-bar {
            display: flex;
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }
        .filter-bar input, .filter-bar select {
            padding: var(--space-2) var(--space-3);
            border: 1.5px solid var(--color-neutral-300);
            border-radius: var(--radius-md);
            font-family: var(--font-sans);
            font-size: var(--text-sm);
        }
        .filter-bar input { flex: 1; }
        .filter-bar input:focus, .filter-bar select:focus {
            outline: none;
            border-color: var(--color-primary-500);
        }
        .rejection-reason {
            background: var(--color-warning, rgba(201,125,47,0.08));
            border-left: 3px solid var(--color-warning);
            padding: var(--space-2) var(--space-3);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin-bottom: var(--space-3);
            font-size: var(--text-sm);
        }
        .empty-state {
            text-align: center;
            padding: var(--space-12);
            color: var(--color-neutral-500);
        }
        .tab-count {
            background: var(--color-neutral-200);
            color: var(--color-neutral-700);
            font-size: var(--text-xs);
            padding: 0.1rem 0.4rem;
            border-radius: 10px;
            margin-left: var(--space-2);
        }
        .tab.active .tab-count {
            background: var(--color-accent-600);
            color: white;
        }
        .username-meta {
            color: var(--color-neutral-500);
            font-size: var(--text-xs);
        }
        .meta-right { text-align: right; }
        @media (max-width: 768px) {
            .filter-bar { flex-direction: column; }
            .comment-item.is-reply { margin-left: var(--space-4); }
        }
    </style>
</head>
<body>
    <!-- Info Bar -->
    <div class="info-bar">
        <div class="info-bar-content">
            <div>Fläsch, Graubünden, Schweiz</div>
            <div class="satire-badge">SATIRE</div>
        </div>
    </div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><img src="logo.png" alt="Fläsch Info Logo"></a>
            <button type="button" class="nav-toggle" title="Navigation" aria-label="Navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links">
                <a href="index.html">Startseite</a>
                <a href="ueber-uns.html">Über uns</a>
                <a href="kontakt.html">Kontakt</a>
                <button type="button" class="btn btn-logout" onclick="logout()">Abmelden</button>
            </div>
        </div>
    </nav>

    <!-- Admin Sub-Navigation -->
    <div class="admin-subnav">
        <div class="admin-subnav-content">
            <span class="admin-label">Admin</span>
            <a href="create-article.html">Artikel erstellen</a>
            <a href="my-articles.html">Meine Artikel</a>
            <a href="admin-comments.html" class="active">Kommentare</a>
            <a href="admin-users.html">Benutzer</a>
            <a href="admin-context.html">Kontext</a>
        </div>
    </div>

    <!-- Admin Header -->
    <div class="admin-header">
        <div class="admin-header-content">
            <div>
                <h1>Kommentarverwaltung</h1>
                <p>Alle Kommentare im Überblick</p>
            </div>
        </div>
    </div>

    <div class="admin-container">
        <div id="messageContainer"></div>

        <!-- Stats -->
        <div class="stat-grid">
            <div class="stat-box">
                <div class="stat-number" id="totalCount">-</div>
                <div class="stat-label">Kommentare total</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="articleCount">-</div>
                <div class="stat-label">Artikel mit Kommentaren</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="rejectedCount">-</div>
                <div class="stat-label">Abgelehnte (Review)</div>
            </div>
        </div>

        <!-- Tabs & Content -->
        <div class="card">
            <div class="tabs">
                <button type="button" class="tab active" data-tab="approved" onclick="switchTab('approved')">
                    Alle Kommentare <span class="tab-count" id="approvedTabCount">0</span>
                </button>
                <button type="button" class="tab" data-tab="rejected" onclick="switchTab('rejected')">
                    Abgelehnte <span class="tab-count" id="rejectedTabCount">0</span>
                </button>
            </div>

            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="Suche nach Benutzer, Text oder Artikel..." oninput="filterComments()">
                <select id="articleFilter" title="Nach Artikel filtern" onchange="filterComments()">
                    <option value="">Alle Artikel</option>
                </select>
            </div>

            <div id="approvedTab">
                <div id="commentList"><div class="loading">Lade Kommentare...</div></div>
            </div>

            <div id="rejectedTab" style="display: none;">
                <div id="rejectedList"><div class="loading">Lade abgelehnte Kommentare...</div></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const sessionToken = localStorage.getItem('sessionToken');
        let allComments = [];
        let rejectedComments = [];
        let currentTab = 'approved';

        async function checkAdminAccess() {
            if (!sessionToken) { window.location.href = 'admin.html'; return false; }
            try {
                const response = await fetch(`${API_BASE}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionToken })
                });
                const result = await response.json();
                if (!result.valid || (result.role !== 'admin' && result.role !== 'author')) {
                    showMessage('Keine Berechtigung. Nur Admins und Autoren können auf diese Seite zugreifen.', 'error');
                    setTimeout(() => window.location.href = 'my-articles.html', 2000);
                    return false;
                }
                return true;
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = 'admin.html';
                return false;
            }
        }

        function showMessage(text, type = 'success') {
            const messageContainer = document.getElementById('messageContainer');
            messageContainer.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => { messageContainer.innerHTML = ''; }, 5000);
        }

        async function loadAllComments() {
            try {
                const response = await fetch(`${API_BASE}/comments?action=admin-all`, {
                    headers: { 'Authorization': `Bearer ${sessionToken}` }
                });
                const result = await response.json();
                if (result.success) {
                    allComments = result.comments;
                    updateStats();
                    populateArticleFilter();
                    renderComments();
                } else {
                    showMessage('Fehler beim Laden: ' + result.error, 'error');
                }
            } catch (error) {
                console.error('Load comments error:', error);
                showMessage('Fehler beim Laden der Kommentare', 'error');
            }
        }

        async function loadRejectedComments() {
            try {
                const response = await fetch(`${API_BASE}/admin-rejected-comments?sub=list`, {
                    headers: { 'Authorization': `Bearer ${sessionToken}` }
                });
                const result = await response.json();
                if (result.success) {
                    rejectedComments = result.comments;
                    document.getElementById('rejectedCount').textContent = rejectedComments.length;
                    document.getElementById('rejectedTabCount').textContent = rejectedComments.length;
                    renderRejectedComments();
                }
            } catch (error) {
                console.error('Load rejected comments error:', error);
            }
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = allComments.length;
            document.getElementById('approvedTabCount').textContent = allComments.length;
            const articles = new Set(allComments.map(c => c.articleSlug));
            document.getElementById('articleCount').textContent = articles.size;
        }

        function populateArticleFilter() {
            const select = document.getElementById('articleFilter');
            const articles = [...new Set(allComments.map(c => c.articleSlug))].sort();
            select.innerHTML = '<option value="">Alle Artikel</option>';
            articles.forEach(slug => {
                const option = document.createElement('option');
                option.value = slug;
                option.textContent = slug;
                select.appendChild(option);
            });
        }

        function filterComments() {
            if (currentTab === 'approved') renderComments();
            else renderRejectedComments();
        }

        function getFilteredComments(comments) {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const articleFilter = document.getElementById('articleFilter').value;
            return comments.filter(c => {
                if (articleFilter && c.articleSlug !== articleFilter) return false;
                if (search) {
                    const searchable = `${c.displayName} ${c.username} ${c.text} ${c.articleSlug} ${c.articleTitle || ''}`.toLowerCase();
                    if (!searchable.includes(search)) return false;
                }
                return true;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderComments() {
            const container = document.getElementById('commentList');
            const filtered = getFilteredComments(allComments);
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Keine Kommentare gefunden</p></div>';
                return;
            }
            container.innerHTML = filtered.map(comment => {
                const date = new Date(comment.timestamp).toLocaleString('de-CH');
                const isReply = comment.parentId !== null;
                return `
                    <div class="comment-item ${isReply ? 'is-reply' : ''}" id="item-${comment.id}">
                        <div class="comment-meta">
                            <div>
                                <span class="author">${escapeHtml(comment.displayName)}</span>
                                <span class="username-meta">(@${escapeHtml(comment.username)})</span>
                                ${isReply ? '<span class="badge-reply">Antwort</span>' : ''}
                            </div>
                            <div class="meta-right">
                                <a class="article-link" href="${comment.articleSlug}.html" target="_blank">${escapeHtml(comment.articleSlug)}</a>
                                <div class="date">${date}</div>
                            </div>
                        </div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                        <div class="comment-actions">
                            <button type="button" class="btn btn-primary btn-sm" onclick="toggleReplyForm('${comment.id}', '${escapeHtml(comment.articleSlug)}')">Antworten</button>
                            <button type="button" class="btn btn-danger btn-sm" onclick="deleteComment('${escapeHtml(comment.articleSlug)}', '${comment.id}')">Löschen</button>
                        </div>
                        <div class="reply-form" id="reply-${comment.id}">
                            <textarea id="replyText-${comment.id}" placeholder="Deine Antwort als Admin..."></textarea>
                            <div style="display: flex; gap: 0.5rem;">
                                <button type="button" class="btn btn-success btn-sm" onclick="submitReply('${comment.id}', '${escapeHtml(comment.articleSlug)}')">Antwort senden</button>
                                <button type="button" class="btn btn-outline btn-sm" onclick="toggleReplyForm('${comment.id}')">Abbrechen</button>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function renderRejectedComments() {
            const container = document.getElementById('rejectedList');
            const filtered = getFilteredComments(rejectedComments);
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Keine abgelehnten Kommentare</p></div>';
                return;
            }
            container.innerHTML = filtered.map(comment => {
                const date = new Date(comment.timestamp).toLocaleString('de-CH');
                return `
                    <div class="comment-item" id="rejected-${comment.id}">
                        <div class="comment-meta">
                            <div>
                                <span class="author">${escapeHtml(comment.displayName)}</span>
                                <span class="username-meta">(@${escapeHtml(comment.username)})</span>
                                <span class="badge-rejected">Abgelehnt</span>
                            </div>
                            <div class="meta-right">
                                <a class="article-link" href="${comment.articleSlug}.html" target="_blank">${escapeHtml(comment.articleSlug)}</a>
                                <div class="date">${date}</div>
                            </div>
                        </div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                        <div class="rejection-reason">
                            <strong>Grund:</strong> ${escapeHtml(comment.rejectionReason || '-')}
                            ${comment.severity ? ` | <strong>Schwere:</strong> ${escapeHtml(comment.severity)}` : ''}
                        </div>
                        <div class="comment-actions">
                            <button type="button" class="btn btn-success btn-sm" onclick="approveRejected('${comment.id}')">Trotzdem veröffentlichen</button>
                            <button type="button" class="btn btn-danger btn-sm" onclick="deleteRejected('${comment.id}')">Endgültig löschen</button>
                        </div>
                    </div>`;
            }).join('');
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('approvedTab').style.display = tab === 'approved' ? 'block' : 'none';
            document.getElementById('rejectedTab').style.display = tab === 'rejected' ? 'block' : 'none';
        }

        function toggleReplyForm(commentId) {
            const form = document.getElementById(`reply-${commentId}`);
            const isVisible = form.style.display === 'block';
            document.querySelectorAll('.reply-form').forEach(f => f.style.display = 'none');
            if (!isVisible) {
                form.style.display = 'block';
                document.getElementById(`replyText-${commentId}`).focus();
            }
        }

        async function submitReply(commentId, articleSlug) {
            const textarea = document.getElementById(`replyText-${commentId}`);
            const text = textarea.value.trim();
            if (!text) { alert('Bitte gib eine Antwort ein'); return; }
            try {
                const response = await fetch(`${API_BASE}/comments?action=admin-reply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
                    body: JSON.stringify({ articleSlug, commentText: text, parentId: commentId })
                });
                const result = await response.json();
                if (result.success) {
                    showMessage('Antwort erfolgreich veröffentlicht!');
                    textarea.value = '';
                    toggleReplyForm(commentId);
                    await loadAllComments();
                } else {
                    showMessage('Fehler: ' + result.error, 'error');
                }
            } catch (error) {
                console.error('Reply error:', error);
                showMessage('Fehler beim Senden der Antwort', 'error');
            }
        }

        async function deleteComment(articleSlug, commentId) {
            if (!confirm('Kommentar wirklich löschen? Alle Antworten werden ebenfalls gelöscht.')) return;
            try {
                const response = await fetch(`${API_BASE}/comments?action=admin-delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
                    body: JSON.stringify({ articleSlug, commentId })
                });
                const result = await response.json();
                if (result.success) { showMessage(result.message); await loadAllComments(); }
                else { showMessage('Fehler: ' + result.error, 'error'); }
            } catch (error) {
                console.error('Delete error:', error);
                showMessage('Fehler beim Löschen', 'error');
            }
        }

        async function approveRejected(commentId) {
            try {
                const response = await fetch(`${API_BASE}/admin-rejected-comments?sub=approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
                    body: JSON.stringify({ commentId })
                });
                const result = await response.json();
                if (result.success) {
                    showMessage('Kommentar wurde veröffentlicht!');
                    await Promise.all([loadAllComments(), loadRejectedComments()]);
                } else { showMessage('Fehler: ' + result.error, 'error'); }
            } catch (error) {
                console.error('Approve error:', error);
                showMessage('Fehler beim Genehmigen', 'error');
            }
        }

        async function deleteRejected(commentId) {
            if (!confirm('Kommentar endgültig löschen?')) return;
            try {
                const response = await fetch(`${API_BASE}/admin-rejected-comments?sub=delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionToken}` },
                    body: JSON.stringify({ commentId })
                });
                const result = await response.json();
                if (result.success) { showMessage('Kommentar endgültig gelöscht'); await loadRejectedComments(); }
                else { showMessage('Fehler: ' + result.error, 'error'); }
            } catch (error) {
                console.error('Delete rejected error:', error);
                showMessage('Fehler beim Löschen', 'error');
            }
        }

        function logout() {
            if (window.authUtils) { window.authUtils.logout(); }
            else { localStorage.clear(); window.location.href = 'admin.html'; }
        }

        (async () => {
            const hasAccess = await checkAdminAccess();
            if (hasAccess) { await Promise.all([loadAllComments(), loadRejectedComments()]); }
        })();
    </script>
    <script src="cookie-consent.js"></script>
    <script src="auth-utils.js"></script>
</body>
</html>
