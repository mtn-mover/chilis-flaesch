<!DOCTYPE html>
<html lang="de-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Artikel - Fläsch Info Admin</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
    <style>
        /* Page-specific styles */
        .article-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: var(--space-6);
        }
        .article-card {
            background: var(--color-white);
            border: 1px solid var(--color-neutral-300);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            transition: box-shadow 0.2s;
        }
        .article-card:hover { box-shadow: var(--shadow-md); }
        .article-card h3 {
            font-family: var(--font-serif);
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--color-neutral-900);
            margin-bottom: var(--space-3);
        }
        .article-meta {
            font-size: var(--text-sm);
            color: var(--color-neutral-500);
            margin-bottom: var(--space-4);
            line-height: var(--leading-relaxed);
        }
        .article-meta a { color: var(--color-accent-600); }
        .article-category {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 2px;
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: var(--tracking-wider);
        }
        .category-politik { background: rgba(190,49,68,0.1); color: var(--cat-politik); }
        .category-wirtschaft { background: rgba(201,125,47,0.1); color: var(--cat-wirtschaft); }
        .category-kurioses { background: rgba(124,92,191,0.1); color: var(--cat-kurioses); }
        .category-gesellschaft { background: rgba(46,125,155,0.1); color: var(--cat-gesellschaft); }
        .category-kirche { background: rgba(61,122,79,0.1); color: var(--cat-kirche); }
        .category-kultur { background: rgba(46,125,155,0.1); color: var(--cat-kultur); }
        .category-sport { background: rgba(61,139,95,0.1); color: var(--cat-sport); }
        .article-status {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 2px;
            font-size: var(--text-xs);
            font-weight: 600;
            margin-left: var(--space-2);
        }
        .status-draft { background: rgba(201,125,47,0.1); color: var(--color-warning); }
        .status-published { background: rgba(61,122,79,0.1); color: var(--color-success); }
        .article-actions {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            margin-top: var(--space-4);
            padding-top: var(--space-4);
            border-top: 1px solid var(--color-neutral-100);
        }
        .btn-info { background: var(--color-info); color: white; }
        .btn-info:hover { background: #24687F; color: white; }
        .empty-state {
            text-align: center;
            padding: var(--space-16);
            color: var(--color-neutral-500);
        }
        .empty-state h2 {
            font-family: var(--font-serif);
            color: var(--color-neutral-700);
            margin-bottom: var(--space-2);
        }
        .user-greeting {
            font-weight: 600;
            color: var(--color-primary-700);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .user-greeting.show { opacity: 1; }
        .newspaper-link { display: none; }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinner {
            border: 3px solid var(--color-neutral-200);
            border-top: 3px solid var(--color-accent-600);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--space-4);
        }
        @media (max-width: 768px) {
            .article-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Info Bar -->
    <div class="info-bar">
        <div class="info-bar-content">
            <div>Fläsch, Graubünden, Schweiz</div>
            <div class="satire-badge">SATIRE</div>
        </div>
    </div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo"><img src="logo.png" alt="Fläsch Info Logo"></a>
            <button type="button" class="nav-toggle" title="Navigation" aria-label="Navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Startseite</a>
                <span class="user-greeting" id="userGreeting"></span>
                <button type="button" class="btn btn-logout" onclick="logout()">Abmelden</button>
            </div>
        </div>
    </nav>

    <!-- Admin Sub-Navigation -->
    <div class="admin-subnav">
        <div class="admin-subnav-content">
            <span class="admin-label">Admin</span>
            <a href="create-article.html">Artikel erstellen</a>
            <a href="my-articles.html" class="active">Meine Artikel</a>
            <a href="admin-comments.html">Kommentare</a>
            <a href="admin-users.html" id="adminUsersLink" class="admin-only">Benutzer</a>
            <a href="admin-context.html" id="adminContextLink" class="admin-only">Kontext</a>
            <a href="create-newspaper.html" id="newspaperLink" class="admin-only">Zeitung erstellen</a>
        </div>
    </div>

    <!-- Admin Header -->
    <div class="admin-header">
        <div class="admin-header-content">
            <div><h1>Meine Artikel</h1></div>
        </div>
    </div>

    <div class="admin-container">
        <div id="loadingIndicator" class="loading">
            <div class="spinner"></div>
            <p>Lade Artikel...</p>
        </div>

        <div id="articlesGrid" class="article-grid" style="display: none;"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <h2>Noch keine Artikel</h2>
            <p>Erstelle deinen ersten Artikel!</p>
            <a href="create-article.html" class="btn btn-primary" style="margin-top: var(--space-4);">Artikel erstellen</a>
        </div>
    </div>

    <script src="cookie-consent.js"></script>
    <script src="auth-utils.js"></script>
    <script>
        const sessionToken = localStorage.getItem('sessionToken');
        if (!sessionToken) { window.location.href = 'admin.html'; }

        function logout() {
            if (window.authUtils) { window.authUtils.logout(); }
            else {
                localStorage.removeItem('sessionToken');
                localStorage.removeItem('username');
                localStorage.removeItem('userDisplayName');
                localStorage.removeItem('userRole');
                localStorage.removeItem('loginTimestamp');
                window.location.href = 'admin.html';
            }
        }

        async function loadDrafts() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const articlesGrid = document.getElementById('articlesGrid');
            const emptyState = document.getElementById('emptyState');

            try {
                const response = await fetch('/api/get-drafts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionToken })
                });
                const result = await response.json();
                loadingIndicator.style.display = 'none';
                if (!response.ok) throw new Error(result.error);

                if (result.userDisplayName) {
                    const el = document.getElementById('userGreeting');
                    if (el) { el.textContent = `Hallo ${result.userDisplayName}`; el.classList.add('show'); }
                }

                // Show admin-only links
                if (result.isAdmin) {
                    document.getElementById('newspaperLink').classList.remove('admin-only');
                    document.getElementById('adminUsersLink').classList.remove('admin-only');
                    document.getElementById('adminContextLink').classList.remove('admin-only');
                }

                if (result.drafts.length === 0) { emptyState.style.display = 'block'; return; }

                articlesGrid.style.display = 'grid';
                articlesGrid.innerHTML = result.drafts.map(draft => createArticleCard(draft, result.isAdmin)).join('');
            } catch (error) {
                loadingIndicator.innerHTML = `<p style="color: var(--color-error);">Fehler: ${error.message}</p>`;
            }
        }

        function createArticleCard(draft, isAdmin) {
            const date = new Date(draft.updatedAt).toLocaleDateString('de-CH');
            const canEdit = isAdmin || draft.author === localStorage.getItem('username');
            const isPublished = draft.status === 'published';

            return `
                <div class="article-card">
                    <h3>${draft.title}</h3>
                    <div class="article-meta">
                        <span class="article-category category-${draft.category}">${draft.category}</span>
                        <span class="article-status status-${draft.status}">${draft.status === 'draft' ? 'Entwurf' : 'Veröffentlicht'}</span>
                        <br>
                        <small>Erstellt durch: ${draft.authorDisplayName} | ${date}</small>
                        ${isPublished && draft.publishedUrl ? `<br><small><a href="${draft.publishedUrl}" target="_blank">Artikel ansehen</a></small>` : ''}
                    </div>
                    <div class="article-actions">
                        ${canEdit ? `
                            ${!isPublished ? `
                                <button type="button" class="btn btn-primary btn-sm" onclick="editDraft('${draft.id}')">Bearbeiten</button>
                                <button type="button" class="btn btn-info btn-sm" onclick="previewDraft('${draft.id}')">Vorschau</button>
                                <button type="button" class="btn btn-success btn-sm" onclick="publishDraft('${draft.id}')">Veröffentlichen</button>
                                <button type="button" class="btn btn-danger btn-sm" onclick="deleteDraft('${draft.id}')">Löschen</button>
                            ` : `
                                <button type="button" class="btn btn-primary btn-sm" onclick="editDraft('${draft.id}')">Bearbeiten</button>
                                <button type="button" class="btn btn-info btn-sm" onclick="previewDraft('${draft.id}')">Vorschau</button>
                                <button type="button" class="btn btn-success btn-sm" onclick="republishDraft('${draft.id}')">Neu veröffentlichen</button>
                                <button type="button" class="btn btn-danger btn-sm" onclick="unpublishArticle('${draft.id}')">Von Website löschen</button>
                            `}
                        ` : ''}
                    </div>
                </div>`;
        }

        function editDraft(id) { window.location.href = `create-article.html?edit=${id}`; }

        async function previewDraft(id) {
            try {
                const response = await fetch('/api/get-drafts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionToken })
                });
                const result = await response.json();
                if (!response.ok) { alert('Fehler: ' + (result.error || 'Unbekannter Fehler')); return; }
                const draft = result.drafts.find(d => d.id === id);
                if (!draft) { alert('Artikel nicht gefunden'); return; }
                const previewWindow = window.open('', '_blank');
                if (!previewWindow) { alert('Popup wurde blockiert.'); return; }
                previewWindow.document.write(generatePreviewHTML(draft));
                previewWindow.document.close();
            } catch (error) { alert('Fehler: ' + error.message); }
        }

        function generatePreviewHTML(draft) {
            const categoryLabel = { 'politik': 'Politik', 'wirtschaft': 'Wirtschaft', 'kurioses': 'Kurioses', 'gesellschaft': 'Gesellschaft' }[draft.category] || draft.category;
            const images = draft.images || [];
            const heroImage = images.length > 0 ? images[0] : (draft.image || '');
            const additionalImages = images.length > 1 ? images.slice(1) : [];
            const additionalImagesHTML = additionalImages.map(img => `<img src="${img}" alt="Artikel Bild" style="width: 100%; max-width: 800px; border-radius: 15px; margin: 2.5rem auto; display: block;">`).join('\n');
            const isPublished = draft.status === 'published';
            const bannerColor = isPublished ? '#3D7A4F' : '#BE3144';
            const bannerText = isPublished ? 'VERÖFFENTLICHT - Dies ist eine Vorschau des live Artikels' : 'VORSCHAU - Dieser Artikel ist noch nicht veröffentlicht';
            let articleContent = draft.html || draft.content;
            if (additionalImagesHTML && articleContent) {
                const firstParagraphEnd = articleContent.indexOf('</p>');
                if (firstParagraphEnd !== -1) {
                    articleContent = articleContent.slice(0, firstParagraphEnd + 4) + '\n' + additionalImagesHTML + '\n' + articleContent.slice(firstParagraphEnd + 4);
                } else {
                    articleContent = additionalImagesHTML + '\n' + articleContent;
                }
            }
            const subtitleHTML = draft.subtitle ? `<p style="font-size: 1.2rem; font-style: italic; color: rgba(255,255,255,0.9); margin-bottom: 1.5rem; max-width: 800px; margin-left: auto; margin-right: auto;">${draft.subtitle}</p>` : '';
            return `<!DOCTYPE html><html lang="de-CH"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${draft.title} - VORSCHAU</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body>
            <div style="background:${bannerColor}; color:white; padding:1rem; text-align:center; font-weight:600;">${bannerText}</div>
            <section class="hero-article"><div class="hero-content">${heroImage ? `<img src="${heroImage}" alt="${draft.title}" style="width:100%;max-width:1200px;height:400px;object-fit:cover;margin:0 auto 2rem;border-radius:10px;display:block;">` : ''}<h1>${draft.title}</h1>${subtitleHTML}<div class="article-meta" style="display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;margin-top:1.5rem;"><span class="badge badge-${draft.category}">${categoryLabel}</span><span>Erstellt durch: ${draft.authorDisplayName}</span><span>${new Date(draft.updatedAt).toLocaleDateString('de-CH')}</span></div></div></section>
            <div class="article-content">${articleContent}</div></body></html>`;
        }

        async function deleteDraft(id) {
            if (!confirm('Artikel wirklich löschen?')) return;
            try {
                const response = await fetch('/api/delete-draft', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionToken, draftId: id }) });
                const result = await response.json();
                if (response.ok) { alert('Artikel gelöscht'); loadDrafts(); }
                else { alert('Fehler: ' + result.error); }
            } catch (error) { alert('Fehler: ' + error.message); }
        }

        async function publishDraft(id) {
            if (!confirm('Artikel wirklich veröffentlichen?')) return;
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'publishLoading';
            loadingDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;';
            loadingDiv.innerHTML = '<div class="spinner" style="border-top-color:white;"></div><p style="color:white;font-size:1.2rem;margin-top:1rem;">Artikel wird veröffentlicht...</p>';
            document.body.appendChild(loadingDiv);
            try {
                const response = await fetch('/api/publish-article', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionToken, draftId: id }) });
                const result = await response.json();
                loadingDiv.remove();
                if (response.ok) { alert('Artikel veröffentlicht!\n\nURL: ' + result.url); loadDrafts(); }
                else { alert('Fehler: ' + result.error + (result.details ? '\n\n' + result.details : '')); }
            } catch (error) { loadingDiv.remove(); alert('Fehler: ' + error.message); }
        }

        async function republishDraft(id) {
            if (!confirm('Artikel neu veröffentlichen?')) return;
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'publishLoading';
            loadingDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;';
            loadingDiv.innerHTML = '<div class="spinner" style="border-top-color:white;"></div><p style="color:white;font-size:1.2rem;margin-top:1rem;">Artikel wird neu veröffentlicht...</p>';
            document.body.appendChild(loadingDiv);
            try {
                const response = await fetch('/api/publish-article', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionToken, draftId: id }) });
                const result = await response.json();
                loadingDiv.remove();
                if (response.ok) { alert('Artikel neu veröffentlicht!\n\nURL: ' + result.url); loadDrafts(); }
                else { alert('Fehler: ' + result.error + (result.details ? '\n\n' + result.details : '')); }
            } catch (error) { loadingDiv.remove(); alert('Fehler: ' + error.message); }
        }

        async function unpublishArticle(id) {
            if (!confirm('Artikel von der Website löschen und zurück zu "Entwurf" setzen?')) return;
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'publishLoading';
            loadingDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;';
            loadingDiv.innerHTML = '<div class="spinner" style="border-top-color:white;"></div><p style="color:white;font-size:1.2rem;margin-top:1rem;">Artikel wird zurückgezogen...</p>';
            document.body.appendChild(loadingDiv);
            try {
                const response = await fetch('/api/delete-article', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sessionToken, draftId: id }) });
                const result = await response.json();
                loadingDiv.remove();
                if (response.ok) { alert('Artikel von Website gelöscht. Er ist jetzt wieder ein Entwurf.'); loadDrafts(); }
                else { alert('Fehler: ' + result.error + (result.details ? '\n\n' + result.details : '')); }
            } catch (error) { loadingDiv.remove(); alert('Fehler: ' + error.message); }
        }

        loadDrafts();
    </script>
</body>
</html>
